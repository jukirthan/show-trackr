<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShowTrackr - Sign up</title>
    <link rel="stylesheet" href="\css\style.css" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="nav-left">
          <div class="logo">Show<span class="track">Trackr</span></div>
          <a href="index.html" class="home">Home</a>
          <a href="add.html">Add</a>
        </div>
        <div class="nav-right">
          <a href="login.html">Login</a>
          <a href="#">Sign up</a>
        </div>
      </nav>
    </header>
    <div class="login-wrapper">
      <div class="login-card">
        <h2>Sign up</h2>

        <form>
          <div class="input-group">
            <span class="icon" id="name">👤</span>
            <input type="text" placeholder="Name" id="nameInput"/>
          </div>
          <div class="input-group">
            <span class="icon" id="ema">@</span>
            <input type="email" placeholder="Email" id="emailInput"/>
          </div>
          <div class="input-group">
            <span class="icon" id="pass">🔒</span>
            <input type="password" placeholder="Password" id="passwordInput" />
          </div>

          <p class="terms-text">
            By clicking on Sign up, you agree to
            <strong>terms & conditions</strong> and
            <strong>privacy policy</strong>
          </p>

          <button type="submit" class="btn-login-sub">Sign up</button>
        </form>

        <div class="login-footer">
          <p>Already have an account? <a href="login.html">Log in now</a></p>
        </div>
      </div>
    </div>
 <script src="js\signup.js"></script>
  </body>
</html>
